<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Minecraft Texture Pie Chart</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial, sans-serif;background:#111;color:#eee;margin:0;padding:20px}
h1,h2{margin:6px 0;text-align:center}
.layout{display:grid;grid-template-columns:1fr 360px;gap:20px;max-width:1400px;margin:auto}
.left{min-width:0}
canvas{background:#1a1a1a;border-radius:12px;padding:10px}
.list{margin-top:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
.category{background:#1a1a1a;padding:12px;border-radius:12px}
.category h3{margin:0 0 6px;color:#7dd3fc}
input,select,button{width:100%;padding:8px;margin-top:6px;border-radius:8px;border:none}
button{background:#38bdf8;color:#000;font-weight:bold;cursor:pointer}
.sidebar{background:#1a1a1a;padding:14px;border-radius:12px;height:fit-content}
.small{opacity:.7;font-size:.9em}
.deleteBtn{margin-left:6px;background:#ef4444;color:#fff;padding:2px 6px;border-radius:6px;font-size:.75em;cursor:pointer}
</style>
</head>
<body>
<h1>Minecraft Texture Breakdown</h1>
<div class="layout">
<div class="left">
  <canvas id="pie"></canvas>
  <h2 id="sortedTitle">Sorted List</h2>
  <input id="search" placeholder="Search blocks..." />
  <div class="list" id="list"></div>
</div>
<div class="sidebar">
  <h3>Add New Block</h3>
  <div class="small">Global community list (Firebase powered)</div>
  <input id="nameInput" placeholder="Block name" />
  <select id="catInput"></select>
  <button id="submitBtn">Submit</button>
</div>
</div>

<!--
Manual test cases:
1. Page loads → pie chart renders immediately with base items.
2. Typing in search filters list live without errors.
3. Clicking Submit with empty input shows alert.
4. Clicking Submit with a valid name adds item (when Firebase is available) and updates pie chart.
5. Deleting a community item removes it and updates chart.
-->

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import { getFirestore, collection, getDocs, addDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCjsie4y_EHKWrECxPNtJo2K0SbAxsRoug",
    authDomain: "iateachillpil.firebaseapp.com",
    projectId: "iateachillpil",
    storageBucket: "iateachillpil.firebasestorage.app",
    messagingSenderId: "410694120639",
    appId: "1:410694120639:web:04fe55d5eb1f69866bc20a",
    measurementId: "G-TDEHH8016X"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const baseItems = [
    "Acacia Trapdoor","Allium","Amethyst Block","Amethyst Cluster","Andesite","Azure Bluet","Bamboo Trapdoor","Bat","Bell",
    "Birch Leaves","Birch Log","Birch Planks","Birch Sapling","Birch Trapdoor","Black Candle","Black Candle (Lit)","Blue Candle (Lit)","Blue Ice",
    "Blue Orchid","Bone Block","Bookshelf","Bricks","Brown Candle","Brown Candle (Lit)","Brown Mushroom","Budding Amethyst","Cactus","Candle","Carved Pumpkin","Cave Vines (Lit)"
  ];

  let communityItems = [];
  const CATEGORY_NAMES = ["Items","Nature","Decoration","Building Blocks","Trapdoors","Doors","Animations","Mobs","Ores","Caves","Variant Textures","Separated Sides","Two-State Blocks","Other"];

  const select = document.getElementById("catInput");
  CATEGORY_NAMES.forEach(c => { const o = document.createElement("option"); o.value = c; o.textContent = c; select.appendChild(o); });

  function autoCapitalize(str){ return str.replace(/\b\w/g,l => l.toUpperCase()); }

  function categorize(name){
    const n=name.toLowerCase();
    if(n.includes("trapdoor")) return "Trapdoors";
    if(n.includes(" door") && !n.includes("trapdoor")) return "Doors";
    if(n.includes("ore")) return "Ores";
    if(n==="bat"||n==="wolf") return "Mobs";
    if(n.includes("stone")||n.includes("deepslate")||n.includes("andesite")||n.includes("diorite")||n.includes("gravel")||n.includes("sand")) return "Caves";
    if(n.includes("bookshelf")) return "Variant Textures";
    if(n.includes("(top)")||n.includes("(side)")||n.includes("(front)")) return "Separated Sides";
    if(n.includes("(lit)")||n.includes("on)")||n.includes("moist")) return "Two-State Blocks";
    if(n.includes("overlay")||n.includes("stages")) return "Animations";
    if(n.includes("flower")||n.includes("tulip")||n.includes("rose")||n.includes("daisy")||n.includes("orchid")||n.includes("grass")||n.includes("fern")||n.includes("leaves")||n.includes("sapling")||n.includes("vines")||n.includes("mushroom")||n.includes("cactus")||n.includes("cane")||n.includes("petals")||n.includes("propagule")) return "Nature";
    if(n.includes("candle")||n.includes("bell")||n.includes("terracotta")||n.includes("pumpkin")||n.includes("flower pot")||n.includes("glowstone")) return "Decoration";
    if(n.includes("elytra")||n.includes("minecart")||n.includes("item frame")||n.includes("torch")||n.includes("rail")) return "Items";
    if(n.includes("planks")||n.includes("log")||n.includes("brick")||n.includes("glass")||n.includes("ice")||n.includes("snow")) return "Building Blocks";
    return "Other";
  }

  function buildCategories(){
    const map = {};
    CATEGORY_NAMES.forEach(c => map[c]=[]);
    const combined = [...baseItems.map(n=>({name:n})), ...communityItems];
    combined.forEach(obj => { const cat = obj.category || categorize(obj.name); map[cat].push(obj); });
    return map;
  }

  let chart;
  function render(){
    const categories = buildCategories();
    const total = Object.values(categories).flat().length;
    document.getElementById("sortedTitle").textContent = `Sorted List (${total})`;

    const q = document.getElementById("search").value.toLowerCase();
    const listDiv = document.getElementById("list");
    listDiv.innerHTML = "";

    Object.entries(categories).forEach(([cat, arr]) => {
      const filtered = arr.filter(x => x.name.toLowerCase().includes(q));
      if(!filtered.length) return;
      const div = document.createElement("div");
      div.className = "category";
      const listHTML = filtered.sort((a,b)=>a.name.localeCompare(b.name)).map(obj=>{
        const isCommunity=obj.fromCommunity;
        const label=isCommunity ? `${obj.name} (submitted by community member)` : obj.name;
        const delBtn = isCommunity ? `<span class=\"deleteBtn\" data-id=\"${obj.id}\">Delete</span>` : "";
        return `<li>${label} ${delBtn}</li>`;
      }).join("");
      div.innerHTML = `<h3>${cat} (${filtered.length})</h3><ul>${listHTML}</ul>`;
      listDiv.appendChild(div);
    });

    // delegate delete clicks
    listDiv.querySelectorAll('.deleteBtn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.getAttribute('data-id');
        await deleteItem(id);
      });
    });

    const labels=[]; const data=[];
    Object.entries(categories).forEach(([k,v])=>{if(v.length){labels.push(k);data.push(v.length);}});

    if(chart) chart.destroy();
    chart = new Chart(document.getElementById('pie'), {
      type: 'pie',
      data: {labels, datasets:[{data, backgroundColor:labels.map((_,i)=>`hsl(${i*30%360},70%,50%)`)}]},
      options: { plugins:{legend:{labels:{color:'#fff'}}, tooltip:{callbacks:{label:(ctx)=>{const total=data.reduce((a,b)=>a+b,0);const val=ctx.raw;const pct=((val/total)*100).toFixed(1);return`${ctx.label}: ${val} (${pct}%)`;}}}}}
    });
  }

  async function loadCommunity(){
    try{
      const snap = await getDocs(collection(db,"blocks"));
      communityItems = snap.docs.map(d=>({id:d.id,name:d.data().name,category:d.data().category,fromCommunity:true}));
      render();
    } catch(e){
      console.log("Firebase not loaded, showing base pie chart only.");
      render();
    }
  }

  async function addBlock(){
    let name = document.getElementById("nameInput").value.trim();
    const cat = document.getElementById("catInput").value;
    if(!name) return alert("Enter a name");
    name = autoCapitalize(name);
    await addDoc(collection(db,"blocks"), {name, category:cat});
    document.getElementById("nameInput").value="";
    await loadCommunity();
  }

  async function deleteItem(id){
    if(!confirm("Delete this community item?")) return;
    await deleteDoc(doc(db,"blocks",id));
    await loadCommunity();
  }

  // Bind events AFTER functions exist (fixes ReferenceError)
  document.getElementById("submitBtn").addEventListener("click", addBlock);
  document.getElementById("search").addEventListener("input", render);

  // initial render
  render();
  loadCommunity();
</script>
</body>
</html>
